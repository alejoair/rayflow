[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rayflow"
version = "0.1.0"
description = "Visual workflow orchestration on Ray"
requires-python = ">=3.10"
dependencies = [
    "ray>=2.9",
]

[project.optional-dependencies]
serve = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "httpx>=0.27",
]

[project.scripts]
rayflow = "rayflow.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["rayflow*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
