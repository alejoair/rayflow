[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rayflow"
version = "0.1.0"
description = "Visual workflow orchestration on Ray"
requires-python = ">=3.10"
dependencies = [
    "ray>=2.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["rayflow*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
