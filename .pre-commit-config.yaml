# Local, first-party hooks only — no external repos, nothing published.
# `pre-commit install` only wires the `pre-commit` stage by default; this
# repo also uses `commit-msg`, so run:
#   pre-commit install --hook-type pre-commit --hook-type commit-msg
# (default_install_hook_types below makes a plain `pre-commit install`
# do the same.)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: file-map-generate
        name: Regenerate rayflow_file_map.json (file set + import-graph edges)
        description: >
          See scripts/generate_file_map.py. Mechanical, no LLM: file set via
          `git ls-files` (excludes rayflow/editor/static/dist/), and
          depends_on/dependents edges for .py and .ts/.tsx files computed by
          parsing real import statements with tree-sitter. Brand-new files
          get a draft stub (description/system candidates, no LLM) for
          file-map-draft to confirm next. Never blocks. Must run before
          file-map-draft and before claude-md-generate/agents-generate
          (both read rayflow_file_map.json).
        entry: python3 scripts/generate_file_map.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: file-map-draft
        name: Confirm/correct draft description+system for new file map entries
        description: >
          See scripts/draft_file_map_entries.py. Runs after file-map-generate.
          No-op, no LLM call, if rayflow_file_map.json has no pending
          `_draft_candidate`. Otherwise runs one batched
          `claude -p --agent rayflow-router` call to confirm or correct each
          pending file's cheap candidate description/system. Never blocks
          (infra failures leave the drafts as unverified stubs).
        entry: python3 scripts/draft_file_map_entries.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: macro-agents-generate
        name: Regenerate macrosistema-level agents (.claude/agents/rayflow-macro-*.md)
        description: >
          See scripts/generate_macro_agents.py. One
          .claude/agents/rayflow-macro-<macrosistema>.md per macrosistema
          declared in rayflow_file_map.json's `systems.<system>.macrosistemas`
          field (a many-to-many grouping, e.g. `packaging` belongs to both
          `interfaces` and `frontend`). Deterministic, no LLM. Runs after
          file-map-draft (needs a settled rayflow_file_map.json) and before
          agents-generate: this generator only reads rayflow_file_map.json,
          never the per-system specialist .md files themselves, so it has no
          ordering dependency on agents-generate having already run in this
          commit — but it makes sense to regenerate the higher-level
          macro-agents before the per-system ones in the file, mirroring the
          top-down order a human would read `.claude/agents/` in. Never
          blocks.
        entry: python3 scripts/generate_macro_agents.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: claude-md-generate
        name: Regenerate CLAUDE.md from rayflow_system_prompt.md + SOT + file map
        description: >
          See docs/claude_md_generation.md and scripts/generate_claude_md.py.
          CLAUDE.md is a generated file (banner + rayflow_system_prompt.md
          verbatim + an index of RAYFLOW_SOURCE_OF_TRUTH.json sections and
          rayflow_file_map.json systems). Runs on every commit, deterministic
          (no LLM), and re-stages CLAUDE.md if it changed so the regenerated
          version rides along in the same commit. Never blocks — editing
          CLAUDE.md by hand is simply overwritten on the next commit; edit
          rayflow_system_prompt.md instead.
        entry: python3 scripts/generate_claude_md.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: agents-generate
        name: Regenerate per-system specialist subagents (.claude/agents/)
        description: >
          See rayflow_agents_system.md and scripts/generate_specialist_agents.py.
          One .claude/agents/rayflow-<system>-specialist.md per system in
          rayflow_file_map.json.systems, with real content (file
          descriptions, inter-system dependencies, the SOT claims whose
          evidence falls in that system, open issues that mention it) — not
          just pointers, since regenerating on every commit (same mechanism
          as claude-md-generate) removes the staleness risk that motivated
          avoiding embedded content in the first place. Deterministic, no
          LLM. Never blocks.
        entry: python3 scripts/generate_specialist_agents.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: sot-commit-guard
        name: Require a Sot-Change trailer when editing RAYFLOW_SOURCE_OF_TRUTH.json
        description: >
          See docs/issues_system.md §6.3 and scripts/check_sot_commit_message.py.
          Layer 2 of the SOT edit-blocking design: rejects any commit that
          touches RAYFLOW_SOURCE_OF_TRUTH.json without a `Sot-Change: <reason>`
          trailer in the commit message.
        entry: python3 scripts/check_sot_commit_message.py
        language: system
        stages: [commit-msg]
      - id: sot-audit
        name: Audit SOT claims affected by this commit's staged diff
        description: >
          See docs/issues_system.md §6.2 and scripts/run_sot_audit.py. Scopes
          RAYFLOW_SOURCE_OF_TRUTH.json claims to the staged diff via
          .claude/hooks/_sot_scope.py (no-op, no LLM call, if nothing in
          scope), then runs the rayflow-auditor subagent
          (.claude/agents/rayflow-auditor.md) via `claude -p --agent`. Blocks
          the commit only if the auditor writes new content to
          rayflow_issues.json — infra failures (claude missing, timeout) fail
          open and just warn.
        entry: python3 scripts/run_sot_audit.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
