name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      # The action evaluates CLA sign-off per COMMIT AUTHOR, not just whoever
      # opened the PR. That breaks for PRs whose commits are authored by an
      # automated identity with no GitHub account (e.g. AI-assisted commits
      # authored as "Claude <noreply@anthropic.com>") even when the PR itself
      # was opened by the maintainer (already in `allowlist` below) — there is
      # no GitHub login to match against. Since only the maintainer's own
      # tooling produces such commits, skip the check entirely when the PR was
      # opened by the maintainer, regardless of how its commits are authored.
      # Real external contributions are unaffected: this only short-circuits
      # PRs whose `pull_request.user.login` (or, on the comment path, the
      # PR/issue author) is the maintainer.
      - name: "CLA Assistant"
        if: >
          (
            (github.event_name == 'issue_comment' && (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') && github.event.issue.user.login != 'alejoair')
            ||
            (github.event_name == 'pull_request_target' && github.event.pull_request.user.login != 'alejoair')
          )
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A Personal Access Token is required so signatures can be stored in
          # the repository. Create one (repo scope) and add it as the secret
          # CLA_SIGNATURES_TOKEN in the repo settings.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Text contributors type to sign:
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA."
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/alejoair/rayflow/blob/master/CLA.md"
          # Branch where the signatures file is stored (repo default is master):
          branch: "master"
          # Accounts that never need to sign (maintainer + bots):
          allowlist: "alejoair,dependabot[bot],*[bot]"
