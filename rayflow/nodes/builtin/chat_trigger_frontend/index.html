<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayflow Chat</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --border: #2a2f3c;
      --text: #e6e8ee;
      --muted: #8b91a3;
      --accent: #6b8afd;
      --accent-hover: #5570ef;
      --user-bubble: #2a3450;
      --flow-bubble: #1f2330;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }
    header .flow-name {
      color: var(--muted);
      font-weight: 400;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-bottom-right-radius: 3px;
    }
    .msg.flow {
      align-self: flex-start;
      background: var(--flow-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .msg.error {
      align-self: flex-start;
      background: #3a1f24;
      border: 1px solid #5a2a30;
      color: #f0a8af;
    }
    .msg.typing {
      align-self: flex-start;
      color: var(--muted);
      font-style: italic;
    }
    form {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    #input {
      flex: 1;
      padding: 11px 14px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    #input:focus { border-color: var(--accent); }
    #send {
      padding: 11px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #send:hover:not(:disabled) { background: var(--accent-hover); }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <span class="dot"></span>
      <h1>Chat <span class="flow-name" id="flow-name"></span></h1>
    </header>
    <div id="messages"></div>
    <form id="form" autocomplete="off">
      <input id="input" placeholder="Type a message…" autofocus />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script>
    // The flow name is the path segment between /flows/ and /ui in the URL.
    const match = window.location.pathname.match(/^\/flows\/([^/]+)\/ui\/?$/);
    const flowName = match ? decodeURIComponent(match[1]) : "";
    const runUrl = `/flows/${encodeURIComponent(flowName)}/run`;
    document.getElementById("flow-name").textContent = flowName ? `· ${flowName}` : "";

    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMsg(text, cls) {
      const el = document.createElement("div");
      el.className = `msg ${cls}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function formatOutput(outputs) {
      if (outputs == null) return "(no output)";
      if (typeof outputs === "string") return outputs;
      // Render the flow's outputs object; if it has a single value, show it
      // directly, otherwise show the JSON.
      const values = Object.values(outputs);
      if (values.length === 1) return String(values[0]);
      try { return JSON.stringify(outputs, null, 2); }
      catch { return String(outputs); }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, "user");
      input.value = "";
      sendBtn.disabled = true;
      const typing = addMsg("…", "typing");

      try {
        // The flow declares `message` as an input; we send it in the body.
        const res = await fetch(runUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        typing.remove();

        if (!res.ok) {
          const body = await res.text();
          addMsg(`HTTP ${res.status}: ${body}`, "error");
          return;
        }

        const data = await res.json();
        // /flows/{name}/run returns the flow's outputs object directly.
        addMsg(formatOutput(data), "flow");
      } catch (err) {
        typing.remove();
        addMsg(`Request failed: ${err.message}`, "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
