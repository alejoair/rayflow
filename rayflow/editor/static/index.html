<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayflow Editor</title>
  <link rel="stylesheet" href="/editor/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.3.6/dist/style.css" />

  <script type="importmap">
  {
    "imports": {
      "react":                        "https://esm.sh/react@18.3.1",
      "react-dom":                    "https://esm.sh/react-dom@18.3.1",
      "react-dom/client":             "https://esm.sh/react-dom@18.3.1/client",
      "htm/react":                    "https://esm.sh/htm@3.1.1/react",
      "@xyflow/react":                "https://esm.sh/@xyflow/react@12.3.6?deps=react@18.3.1,react-dom@18.3.1",
      "codemirror":                   "https://esm.sh/codemirror@6.0.1",
      "@codemirror/lang-python":      "https://esm.sh/@codemirror/lang-python@6.1.7",
      "@codemirror/theme-one-dark":   "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
      "@codemirror/view":             "https://esm.sh/@codemirror/view@6.35.3",
      "@codemirror/state":            "https://esm.sh/@codemirror/state@6.5.2"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createElement } from 'react';
    import { createRoot } from 'react-dom/client';
    import App from '/editor/App.js';

    const root = createRoot(document.getElementById('root'));
    root.render(createElement(App));
  </script>
</body>
</html>
