<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayflow Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/themes/dark.css" />
  <link rel="stylesheet" href="/editor/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.3.6/dist/style.css" />

    "imports": {
      "react":            "https://esm.sh/react@18.3.1",

<body>
  <div id="root"></div>
  <script type="module">
    import { createElement } from 'react';
    import { createRoot } from 'react-dom/client';
    import App from '/editor/App.js';

    const root = createRoot(document.getElementById('root'));
    root.render(createElement(App));
